<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find My Valentine - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        h1 {
            font-size: 3em;
            font-family: 'Pacifico', cursive;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.3);
        }
        p {
            font-size: 1.5em;
            font-weight: 300;
            margin-bottom: 20px;
        }
        .enter-btn {
            padding: 15px 35px;
            font-size: 1.3em;
            font-weight: 600;
            color: white;
            background: #ff0055;
            border: none;
            cursor: pointer;
            border-radius: 50px;
            transition: 0.3s;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.2);
        }
        .enter-btn:hover {
            background: #cc0044;
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <h1> Happy Valentine's Day in Advance❤️</h1>
    <p>Get ready to get Blushed 🤗</p>
    <a href="main.html"><button class="enter-btn">Enter the Love Zone</button></a>
</body>
</html>
