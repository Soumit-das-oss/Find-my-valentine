<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find My Valentine 💘</title>

    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(to right, #ff758c, #ff7eb3, #fad0c4);
            color: #fff;
            font-family: 'Dancing Script', cursive;
            text-align: center;
            padding: 20px;
            overflow-y: auto;
            position: relative;
            font-size: 22px;
        }
        
        .container {
            max-width: 600px;
            margin: auto;
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        
        button {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 16px;
            margin: 10px;
            cursor: pointer;
            font-size: 20px;
            border-radius: 10px;
            font-family: 'Pacifico', cursive;
            transition: transform 0.2s, background 0.3s;
        }
        
        button:hover {
            background-color: #e84118;
            transform: scale(1.1);
        }
        
        .output {
            font-size: 22px;
            font-weight: bold;
            color: #fff;
            margin-top: 15px;
            background: rgba(0, 0, 0, 0.5);
            padding: 12px;
            border-radius: 10px;
            display: inline-block;
        }
        
        input {
            padding: 12px;
            margin: 10px;
            border: 2px solid #ff4757;
            border-radius: 5px;
            font-size: 20px;
        }

        /* Heart Animation */
        @keyframes floatHearts {
            0% { transform: translateY(100vh) scale(0.5); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }
        
        .heart {
            position: absolute;
            bottom: 0;
            width: 30px;
            height: 30px;
            background-color: red;
            clip-path: polygon(50% 0%, 100% 35%, 80% 100%, 50% 80%, 20% 100%, 0% 35%);
            opacity: 0.7;
            animation: floatHearts 5s linear infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Find My Valentine 💘</h1>
        <p>Discover the perfect words to make your heart flutter! ❤️</p>
        
        <h2>💖 Get a Sweet Compliment</h2>
        <button onclick="generateCompliment()">Give Me a Compliment</button>
        <p id="compliment" class="output"></p>
        
        <h2>🔮 Valentine’s Love Fortune</h2>
        <input type="text" id="yourName" placeholder="Your Name">
        <button onclick="generateFortune()">Reveal My Love Destiny</button>
        <p id="fortune" class="output"></p>
        
        <h2>💕 Flirty Pickup Line</h2>
        <button onclick="generatePickupLine()">Get a Flirty Line</button>
        <p id="pickup" class="output"></p>
        
        <h2>🎁 Special Valentine's Discount</h2>
        <button onclick="generateDiscount()">Reveal My Offer</button>
        <p id="discount" class="output"></p>
    </div>
    
    <script>
        function generateHearts() {
            const numHearts = 20;
            for (let i = 0; i < numHearts; i++) {
                let heart = document.createElement("div");
                heart.classList.add("heart");
                heart.style.left = Math.random() * 100 + "vw";
                heart.style.animationDuration = (Math.random() * 2 + 3) + "s";
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 5000);
            }
        }
        setInterval(generateHearts, 500);

        function generateCompliment() {
            const compliments = [
                "You shine brighter than all the stars in the sky! ✨",
                "Your smile is more magical than a fairytale! 💫",
                "You’re sweeter than the chocolate on Valentine’s Day! 🍫",
                "You make my heart skip a beat like a love song! 🎶",
                "You're the missing puzzle piece to someone’s heart! 🧩",
                "Your kindness is as warm as a cozy hug! 🤗",
                "Are you a magician? Because whenever I look at you, everyone else disappears!🎩✨",
                "Do you have a Band-Aid? Because I just scraped my knee falling for you!💘😆",
                "Are you a WiFi signal? Because I'm really feeling a strong connection!📶❤️",
                "Do you like raisins? No? How about a date? 🍇😉",
                "Are you French? Because Eiffel for you! 🇫🇷💖",
                "Are you a time traveler? Because I see you in my future!⏳💕",
                "Are you a parking ticket? Because you’ve got FINE written all over you! 🚗🔥",
                "Can you hold my hand? I want to tell my friends I was touched by an angel! 😇💕",
                "Do you believe in love at first sight, or should I walk by again? 🚶‍♂️💘",
                "I must be a snowflake, because I've fallen for you! ❄️😍",
                "You must be a bank loan, because you’ve got my interest! 💰❤️",
                "If you were a vegetable, you’d be a cute-cumber! 🥒😘",
                "Do you have a map? I keep getting lost in your eyes! 🗺️💙",
                "You must be a campfire, because you’re hot and I want s’more!🔥🍫",
                "Even if there wasn’t gravity on Earth, I’d still fall for you! 🌍💞"
            ];
            document.getElementById("compliment").innerText = compliments[Math.floor(Math.random() * compliments.length)];
        }

        function generateFortune() {
            const yourName = document.getElementById("yourName").value || "Your Love";
            const fortunes = [
                `${yourName}, your soulmate is closer than you think! 💕`,
                `${yourName}, love is on the horizon—get ready for romance! 🌅`,
                `${yourName}, expect a surprise Valentine’s message soon! 📩`,
                `${yourName}, your heart will soon find its perfect match! 💞`,
                `${yourName}, Cupid has set his sights on you! 🏹`,
                `${yourName}, your soulmate is closer than you think! 💕`,
                `${yourName}, your heart shines brightly, and soon, someone special will be drawn to your radiant spirit! ✨`,
                `${yourName}, your loving nature will attract the perfect partner who appreciates you! 💖`,
                `${yourName}, your compassionate heart will find its match, creating a beautiful love story! 🌹`,
                `${yourName}, your loving energy will attract a soulmate who complements your spirit in every way! 💑`,
                `${yourName}, your heart is pure and kind, and you will be rewarded with a genuine love! 🌟`,
                `${yourName}, your warm and caring nature will draw a partner who cherishes you deeply! 🥰`,
                `${yourName}, your tenderness will attract a partner who values and reciprocates your feelings sincerely! 💞`,
                `${yourName}, your positive energy will bring someone special into your life who cherishes you! 🌈`,
                `${yourName}, your love is a rare gem, and someone will recognize and appreciate its true value! 💎`,
                `${yourName}, your affectionate spirit will draw a partner who treasures your love! 💘`,
                `${yourName}, your heart is ready to receive a deep, genuine, and everlasting love! 💗`,
                `${yourName}, your loving personality will attract a partner who seeks a meaningful connection! 💕`,
                `${yourName}, your soulful eyes and gentle demeanor will captivate someone special! 🌹`,
                `${yourName}, your kind and generous heart will find a partner who mirrors your love! 💝`,
                `${yourName}, your warmth will attract a nurturing, fulfilling, and everlasting love! 🌷`,
                `${yourName}, your kindness and compassion will bring a love that is pure and true! ❤`,
                `${yourName}, your magnetic charm will draw someone who complements your soul! 💓`,
                `${yourName}, your heartfelt nature will attract a partner who values your love! 💌`,
                `${yourName}, your love is a beautiful melody, and someone will harmonize with your heart's song! 🎶`

            ];
            document.getElementById("fortune").innerText = fortunes[Math.floor(Math.random() * fortunes.length)];
        }

        function generatePickupLine() {

            [tool.poetry]

version = "0.1.0"
description = ""
authors = ["Your Name <you@example.com>"]

[tool.poetry.dependencies]

            const pickupLines = [
                "Are you a magician? Because whenever I look at you, everyone else disappears! 🪄",
                "Do you have a name? Or can I call you mine? 💖",
                "Are you French? Because Eiffel for you! 😍",
                "Are you a camera? Because every time I look at you, I smile! 😊",
                "If you were a dessert, you'd be a cupcake—sweet, irresistible, and with the perfect amount of frosting.",
                "Are you a shooting star? Because my heart wishes for you every time I see you.",
                "Is your smile a spell? Because every time you smile, magic happens.",
                "Are you a mirror? Because I see myself in you.",
                "Is your smile a black hole? Because it’s irresistibly attractive.",
                "Are you an artist? Because you’ve just drawn me in.",
                "Are you a chef? Because you’ve just added spice to my life.",
                "Are you a magician? Because whenever I look at you, everyone else disappears.",
                "Is your dad an artist? Because you're a masterpiece.",
                "Is it hot in here, or is it just you?",
                "Do you believe in love at first sight, or should I walk by again?",
                "Can you lend me a kiss? I promise I'll give it back."
            ];
            document.getElementById("pickup").innerText = pickupLines[Math.floor(Math.random() * pickupLines.length)];
        }

        function generateDiscount() {
            document.getElementById("discount").innerText = "Lucky You! 50% off on Valentine’s Surprises! 🎁";
        }
    </script>
    <a href="end.html"><button class="enter-btn">Enter To The End Of Our Journey </button></a>
</body>
</html>
