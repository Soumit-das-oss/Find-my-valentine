<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Certificate ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        body {
            background: linear-gradient(to right, #ff758c, #ff7eb3);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            text-align: center;
            padding: 20px;
        }

        .certificate-container {
            max-width: 600px;
            background: white;
            color: black;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.3);
            text-align: center;
            margin: auto;
            font-family: 'Dancing Script', cursive;
            position: relative;
        }

        .certificate-container h2 {
            font-size: 28px;
            color: #ff4757;
        }

        .certificate-container p {
            font-size: 20px;
            font-weight: bold;
        }

        .certificate-container .stamp {
            width: 100px;
            position: absolute;
            bottom: 20px;
            right: 20px;
            opacity: 0.7;
        }

        input {
            padding: 12px;
            font-size: 18px;
            border: 2px solid #ff4757;
            border-radius: 5px;
            margin-top: 10px;
            width: 250px;
        }

        button {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 12px;
            margin: 10px;
            cursor: pointer;
            font-size: 18px;
            border-radius: 5px;
            transition: transform 0.2s, background 0.3s;
        }

        button:hover {
            background-color: #e84118;
            transform: scale(1.1);
        }

        .download-btn {
            display: none;
        }
    </style>
</head>
<body>

    <h1>🎓 Your Personalized Love Certificate 💖</h1>
    <p>Enter your name to get your Love Certificate!</p>
    
    <input type="text" id="nameInput" placeholder="Your Name">
    <br>
    <button onclick="generateCertificate()">Generate Certificate</button>
    
    <br><br>
    <div id="certificate" class="certificate-container" style="display: none;">
        <h2>Certificate of Love 💕</h2>
        <p>This is to certify that</p>
        <h2 id="userName"></h2>
        <p>has officially been awarded the title of:</p>
        <h2 id="loveTitle">❤️ Ultimate Romantic ❤️</h2>
        <p>with a Love Score of</p>
        <h2 id="loveScore">100%</h2>
        <p>🏹 Issued by Cupid & Love Guru 🏹</p>
        <img class="stamp" src="WhatsApp Image 2025-02-13 at 13.52.15_589900ba.jpg" alt="Love Stamp">
    </div>

    <br>
    <button class="download-btn" id="downloadBtn" onclick="downloadCertificate()">Download Certificate 📜</button>
    
    <script>
        function generateCertificate() {
            let name = document.getElementById("nameInput").value;
            if (name.trim() === "") {
                alert("Please enter your name!");
                return;
            }

            let titles = [
                "Master of Pickup Lines 🎤",
                "Certified Valentine Hunter 💘",
                "Ultimate Heartbreaker 💔",
                "Forever Alone King/Queen 👑",
                "True Love Magnet 🧲",
                "Flirty Genius 😘",
                "Romeo/Juliet of the Year 💕",
                "Legendary Lover 🔥",
                "Cupid’s Favorite 🏹",
                "Hopeless Romantic 🌹"
            ];

            let score = Math.floor(Math.random() * 50) + 50 + "%";  // Random Love Score between 50% - 100%

            document.getElementById("userName").innerText = name;
            document.getElementById("loveTitle").innerText = titles[Math.floor(Math.random() * titles.length)];
            document.getElementById("loveScore").innerText = score;

            document.getElementById("certificate").style.display = "block";
            document.getElementById("downloadBtn").style.display = "inline-block";
        }

        function downloadCertificate() {
            html2canvas(document.getElementById("certificate")).then(canvas => {
                let link = document.createElement("a");
                link.href = canvas.toDataURL("image");
                link.download = "Love_Certificate.png";
                link.click();
            });
        }
    </script>

</body>
</html>
