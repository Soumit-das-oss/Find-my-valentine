<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valentine Found! 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        h1 {
            font-size: 3em;
            font-family: 'Pacifico', cursive;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.3);
        }
        p {
            font-size: 1.5em;
            font-weight: 300;
            margin-bottom: 20px;
        }
        .valentine-card {
            background: rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.2);
            font-size: 1.5em;
            max-width: 500px;
        }
        .btn {
            padding: 15px 30px;
            font-size: 1.3em;
            font-weight: 600;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 50px;
            transition: 0.3s;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.2);
            margin-top: 20px;
        }
        .continue-btn {
            background: #ff0055;
        }
        .continue-btn:hover {
            background: #cc0044;
            transform: scale(1.1);
        }
        .end-btn {
            background: #333;
        }
        .end-btn:hover {
            background: #222;
            transform: scale(1.1);
        }
       
        @keyframes floatHearts {
            0% { transform: translateY(100vh) scale(0.5); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }
        .heart {
            position: absolute;
            bottom: 0;
            width: 30px;
            height: 30px;
            background-color: red;
            clip-path: polygon(50% 0%, 100% 35%, 80% 100%, 50% 80%, 20% 100%, 0% 35%);
            opacity: 0.7;
            animation: floatHearts 5s linear infinite;
        }
    </style>
</head>
<body>
    <h1>Congratulations! 💖</h1>
    <p>You have found your perfect Valentine! 😍</p>
    
    <div class="valentine-card">
        <p id="valentineMessage">Loading your Valentine... 💘</p>
    </div>

    <button class="btn continue-btn" onclick="goToMain()">Continue Blushing ❤️</button>
    <button class="btn end-btn" onclick="endValentine()">Enough Romance For Today, End It! 😆</button>
    <button class="btn continue-btn" onclick="goToCer()">Here's Your Love Certificate!!📜</button>

    <script>
        function generateHearts() {
            const numHearts = 20;
            for (let i = 0; i < numHearts; i++) {
                let heart = document.createElement("div");
                heart.classList.add("heart");
                heart.style.left = Math.random() * 100 + "vw";
                heart.style.animationDuration = (Math.random() * 2 + 3) + "s";
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 5000);
            }
        }
        setInterval(generateHearts, 500);

        function goToMain() {
            window.location.href = "main.html";
        }

        function endValentine() {
            alert("Love story khatam! Ab wapas reality mein aao! 😂");
            window.location.href = "certificate.html"; 
        }
        function goToCer() {
            window.location.href = "certificate.html"; 
        }
    </script>
    
</body>
</html>
